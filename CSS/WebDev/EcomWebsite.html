<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkShop</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background: #0f0f0f;
            color: white;
        }
        /* HEADER */
        
        header {
            background: #111;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }
        
        header h1 {
            color: #00e5ff;
        }
        
        nav {
            display: flex;
            align-items: center;
        }
        
        nav input {
            padding: 6px 10px;
            border: none;
            border-radius: 4px;
            margin-right: 20px;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }
        /* HERO */
        
        .hero {
            padding: 60px 40px;
            text-align: center;
            background: linear-gradient(to right, #000, #1a1a1a);
        }
        
        .hero h2 {
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        .hero p {
            color: #aaa;
        }
        /* PRODUCTS */
        
        .products {
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }
        
        .card {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            transition: 0.3s;
            position: relative;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 229, 255, 0.2);
        }
        
        .card img {
            width: 100%;
            border-radius: 8px;
        }
        
        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ff1744;
            padding: 4px 8px;
            font-size: 12px;
            border-radius: 4px;
        }
        
        .card h3 {
            margin: 10px 0;
        }
        
        .rating {
            color: gold;
            font-size: 14px;
        }
        
        .price {
            color: #00e5ff;
            font-weight: bold;
            margin: 8px 0;
        }
        
        button {
            width: 100%;
            padding: 8px;
            border: none;
            background: #00e5ff;
            color: black;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        
        button:hover {
            background: #00bcd4;
        }
        /* FOOTER */
        
        footer {
            text-align: center;
            padding: 20px;
            background: #111;
            border-top: 1px solid #222;
            margin-top: 40px;
            color: #777;
        }
    </style>
</head>

<body>

    <header>
        <h1>DarkShop</h1>
        <nav>
            <input type="text" placeholder="Search...">
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">🛒 Cart</a>
        </nav>
    </header>

    <section class="hero">
        <h2>Premium Dark Collection</h2>
        <p>Minimal. Modern. Powerful.</p>
    </section>

    <section class="products">

        <div class="card">
            <span class="badge">SALE</span>
            <img src="https://via.placeholder.com/250" alt="">
            <h3>Black Hoodie</h3>
            <div class="rating">⭐⭐⭐⭐☆</div>
            <p class="price">$59.99</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250" alt="">
            <h3>Dark Sneakers</h3>
            <div class="rating">⭐⭐⭐⭐⭐</div>
            <p class="price">$89.99</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <span class="badge">NEW</span>
            <img src="https://via.placeholder.com/250" alt="">
            <h3>Minimal Watch</h3>
            <div class="rating">⭐⭐⭐⭐☆</div>
            <p class="price">$129.99</p>
            <button>Add to Cart</button>
        </div>
